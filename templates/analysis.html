<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Analysis | PresentIQ</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/analysis.css') }}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="container">

    <div class="header">
        <h1><i class="fas fa-robot"></i> AI Presentation Analysis</h1>
        <p>Generated by PresentIQ AI</p>
    </div>

    <div class="score-card">
        <h2>🎯 Overall AI Evaluation</h2>
        <p>Gemini AI has analyzed your presentation.</p>
    </div>
    

    <div class="report-card">

        <h2>📄 AI Report</h2>

        <pre>{{ analysis }}</pre>

    </div>

    <div class="buttons">

        <a href="/upload">
            <button>Analyze Another PPT</button>
        </a>

        <a href="/dashboard">
            <button class="secondary">Dashboard</button>
        </a>

    </div>

</div>

</body>
</html>
