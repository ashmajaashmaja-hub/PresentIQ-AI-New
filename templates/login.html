<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PresentIQ - Login</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="background">
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>
</div>

<div class="login-card">

    <h1>Welcome Back 👋</h1>

    <p class="subtitle">
        Continue your AI Presentation Journey
    </p>

    <!-- Login Options -->
    <div id="login-options">

       <button class="google-btn" onclick="window.location.href='/google'">
        <i class="fab fa-google"></i>
        Continue with Google
        </button>

        <button class="email-btn" onclick="showEmailLogin()">
            <i class="fas fa-envelope"></i>
            Continue with Email
        </button>

        <a href="/dashboard" class="guest-btn">
            <i class="fas fa-user"></i>
            Continue as Guest
        </a>

    </div>

    <!-- Email Login Form -->

    <form id="email-login"
          action="/login"
          method="POST"
          style="display:none;">

        <div class="input-box">

            <i class="fas fa-envelope"></i>

            <input
                type="email"
                name="email"
                placeholder="Email Address"
                required>

        </div>

        <div class="input-box">

            <i class="fas fa-lock"></i>

            <input
                type="password"
                id="password"
                name="password"
                placeholder="Password"
                required>

            <i class="fas fa-eye"
               id="eye"
               onclick="togglePassword()"></i>

        </div>

        <div class="remember">

            <label>

                <input type="checkbox">

                Remember Me

            </label>

            <a href="#">Forgot Password?</a>

        </div>

        <button class="login-btn">
            Login
        </button>

        <button
            type="button"
            class="back-btn"
            onclick="goBack()">

            ← Back

        </button>

    </form>

    <p class="signup">

        Don't have an account?

        <a href="/signup">Sign Up</a>

    </p>

</div>

<script src="{{ url_for('static', filename='js/login.js') }}"></script>

</body>
</html>
